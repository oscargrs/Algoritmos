<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h4>Insira o nome do seu time:</h4>
    <input id="input_nomeTime" type="text" value="" />
    <h4>Insira a quantidade de títulos do seu time:</h4>
    <input id="input_qtdTitulo" type="text" value="" />
    <br><br>
    <button id="button_amoMeuTime" onclick="amoMeuTime ()">Amo meu time</button>
</body>
</html>

<script>
    function amoMeuTime () {
        alert("O time " + input_nomeTime.value + " tem " + input_qtdTitulo.value+ " títulos");
    }
</script>
