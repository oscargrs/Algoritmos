<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h4>Insira sua cidade natal:</h4>
    <input id="input_cidadeNatal" type="text" value="" />
    <h4>Insira seu ano de nascimento:</h4>
    <input id="input_anoNasc" type="text" value="" />
    <br><br>
    <button id="button_cadastrar" onclick="cadastrar ()">Cadastrar</button>
</body>
</html>

<script>
    function cadastrar () {
        alert("Você nasceu na cidade de " + input_cidadeNatal.value + " em " + input_anoNasc.value);
    }
</script>
