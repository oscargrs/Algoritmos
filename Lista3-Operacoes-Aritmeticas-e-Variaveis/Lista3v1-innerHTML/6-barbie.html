<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Conversor de Moedas da Barbie</h1>

    Insira a quantidade de B-Dollars: <br>
    <input type="number" id="ipt_bdollars" /> <br>

    Insira o valor da cotação: <br>
    <input type="number" id="ipt_cotacao" /> <br>

    <button onclick="calcular()">Calcular Câmbio</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calcular() {
        div_mensagem.innerHTML = "Ao converter seus B-Dollars, o dinheiro disponível será: R$" + ((ipt_bdollars.value * ipt_cotacao.value) - 5.50)
    }
</script>
