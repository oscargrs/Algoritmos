<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Dividindo a Pizza</h1>

    Insira o valor da pizza:
    <input type="text" id="ipt_valor" /> <br>
    Insira a quantidade de amigos:
    <input type="text" id="ipt_amigos" /> <br>

    <button onclick="divisao()">#lovePizza</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function divisao() {
        div_mensagem.innerHTML = `Cada um dos ${ipt_amigos.value} amigos vai pagar R$${ipt_valor.value / ipt_amigos.value}`
    }
</script>
