<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h1>Cálculo do Vale Transporte</h1>

    Insira o valor da passagem de ônibus:
    <input type="number" id="ipt_passagem" /> <br>

    Insira a quantidade de viagens que você faz no mês:
    <input type="number" id="ipt_viagens" /> <br>

    Insira a distância do trabalho até sua casa (em km):
    <input type="number" id="ipt_distancia" /> <br> <br>

    <button onclick="calcular()">Calcular VT</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function calcular() {
        let passagem = Number(ipt_passagem.value);
        let viagens = Number(ipt_viagens.value);
        let distancia = Number(ipt_distancia.value);

        let uber = viagens * 0.1;
        let onibus = viagens * 0.9;

        let valorUber = uber * (distancia * 0.75);
        let valorOnibus = onibus * passagem;
        let vt = valorUber + valorOnibus;

        div_msg.innerHTML = `Você vai gastar R$${vt} por mês com transporte.`;
    }
</script>
