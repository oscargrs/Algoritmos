<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>
    <h1>Cálculo da média da SPTech</h1>

    Insira a nota da continuada:
    <input type="number" id="ipt_continuada" /> <br>

    Insira a nota semestral:
    <input type="number" id="ipt_semestral" /> <br>

    Insira seu nome:
    <input type="text" id="ipt_nome" /> <br>

    <button onclick="calcular()">Calcular a média</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function calcular() {
        let nome = ipt_nome.value;
        let continuada = Number(ipt_continuada.value) * 0.4;
        let semestral = Number(ipt_semestral.value) * 0.6;
        let media = continuada + semestral;

        div_msg.innerHTML = `A média de ${nome} será de ${media}`;
    }
</script>
