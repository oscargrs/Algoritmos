<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Eleição</h1>

    Insira a quantidade de votos para o "Candidato A": <br>
    <input type="number" id="ipt_cA" /> <br>

    Insira a quantidade de votos para o "Candidato B": <br>
    <input type="number" id="ipt_cB" /> <br>

    Insira a quantidade de votos em branco: <br>
    <input type="number" id="ipt_branco" /> <br>

    Insira a quantidade de votos nulos: <br>
    <input type="number" id="ipt_nulo" /> <br> <br>

    <button onclick="resultado()">Resultado da Eleição</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function resultado() {
        let cA = Number(ipt_cA.value);
        let cB = Number(ipt_cB.value);
        let invalidos = Number(ipt_branco.value) + Number(ipt_nulo.value);
        let total = cA + cB + invalidos;

        div_msg.innerHTML = `
        Total de votos: ${total} <br>  
        Candidato A: ${(cA / total) * 100}% (${cA} votos) <br>
        Candidato B: ${(cB / total) * 100}% (${cB} votos) <br>
        Inválidos: ${(invalidos / total) * 100}% (${invalidos} votos)
        `;
    }
</script>
