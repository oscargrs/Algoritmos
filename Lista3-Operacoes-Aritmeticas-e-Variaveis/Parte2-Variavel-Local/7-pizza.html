<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>Dividindo a pizza e a caixinha do entregador</h1>

    Insira o sabor da pizza:
    <input type="text" id="ipt_sabor" /> <br>

    Insira o valor da pizza:
    <input type="number" id="ipt_valor"> <br>

    Insira a quantidade de amigos que vão comer a pizza:
    <input type="number" id="ipt_qtdAmigos"> <br> <br>

    <button onclick="vervalor()">Ver valor por amigo</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function vervalor() {
        let sabor = ipt_sabor.value;
        let valor = Number(ipt_valor.value) * 1.1;
        let qtdAmigos = Number(ipt_qtdAmigos.value);
        let cadaUmPaga = valor / qtdAmigos;

        div_msg.innerHTML = `Cada amigo vai colaborar com R$${cadaUmPaga} para a pizza de ${sabor}.`;
    }
</script>
