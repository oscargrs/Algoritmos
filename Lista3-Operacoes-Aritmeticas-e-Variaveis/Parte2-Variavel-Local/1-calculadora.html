<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Calculadora Básica</h1>

    Insira o primeiro número: <br>
    <input type="text" id="ipt_n1" /> <br>

    Insira o segundo número: <br>
    <input type="text" id="ipt_n2" /> <br>

    <button onclick="soma()">Soma</button>

    <button onclick="diferenca()">Diferença</button>
    
    <button onclick="produto()">Produto</button>
    
    <button onclick="razao()">Razão</button> <br>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function soma() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let resultado = n1 + n2;

        div_mensagem.innerHTML = `A soma entre ${n1} e ${n2} é ${resultado}`
    }

    function diferenca() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let resultado = n1 - n2;

        div_mensagem.innerHTML = `A diferença entre ${n1} e ${n2} é ${resultado}`
    }

    function produto() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let resultado = n1 * n2;

        div_mensagem.innerHTML = `O produto entre ${n1} e ${n2} é ${resultado}`
    }

    function razao() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let resultado = n1 / n2;

        div_mensagem.innerHTML = `A razão entre ${n1} e ${n2} é ${resultado}`
    }
</script>
