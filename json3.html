<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
<!--
    JSON - JavaScript Object Notation
    Notação de Objetos JavaScript
    NOtação - Simbologia ou representação de algo
    Objeto - Forma de representar algo
-->

    <h3>Usuário</h3>
    Nome: <input type="text" id="ipt_nome"> <br>
    Email: <input type="text" id="ipt_email"> <br>
    Ano de Nascimento: <input type="text" id="ipt_anoNasc"> <br>

    <button onclick="exibir()">Exibir</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function exibir() {
        let usuario = {
            nome: ipt_nome.value,
            email: ipt_email.value,
            anoNasc: ipt_anoNasc.value
        }

        usuario.idade = 2026 - usuario.anoNasc;

        msg.innerHTML = `
        <h3>Informações do Usuário</h3>
        Nome: ${usuario.nome} <br>
        Email: ${usuario.email} <br>
        Idade: ${usuario.idade}`;
    }
</script>
