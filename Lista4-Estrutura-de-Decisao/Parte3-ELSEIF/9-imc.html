<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 9</title>
  </head>

  <body>
    <h1>Índice de Massa Corporal (IMC)</h1>

    Informe o seu peso (em kg):
    <input type="number" id="ipt_peso" /> <br />

    Informe sua altura (em m):
    <input type="number" id="ipt_altura" /> <br />

    <button onclick="calcular()">Calcular IMC</button>

    <div id="div_msg"></div>
  </body>
</html>

<script>
  function calcular() {
    let peso = Number(ipt_peso.value);
    let altura = Number(ipt_altura.value);

    let imc = peso / altura ** 2;

    if (imc < 18.5) {
      div_msg.innerHTML = `Abaixo do peso`;
    } else if (imc <= 24.9) {
      div_msg.innerHTML = `Peso normal`;
    } else if (imc <= 29.9) {
      div_msg.innerHTML = `Acima do peso`;
    } else {
      div_msg.innerHTML = `Cuidado, risco de obesidade`;
    }
  }
</script>
