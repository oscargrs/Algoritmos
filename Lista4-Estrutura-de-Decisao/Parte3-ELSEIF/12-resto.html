<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 12</title>
  </head>

  <body>
    <h1>Resto da Divisão por 5</h1>

    Informe um número maior que zero:
    <input type="number" id="ipt_num" /> <br />

    <button onclick="calcular()">Múltiplo de 5</button>

    <div id="div_msg"></div>
  </body>
</html>

<script>
  function calcular() {
    let num = Number(ipt_num.value);
    let resto = num % 5;

    if (num <= 0) {
      alert("Digite um número maior que zero");
    } else if (resto == 0) {
      div_msg.innerHTML = `Perfeito, esse número é múltiplo de cinco`;
    } else if (resto == 1) {
      div_msg.innerHTML = `Vich, sobrou um`;
    } else if (resto == 2) {
      div_msg.innerHTML = `Para esse o resto é dois`;
    } else if (resto == 3) {
      div_msg.innerHTML = `Com mais dois daria certo`;
    } else if (resto == 4) {
      div_msg.innerHTML = `Só faltou 1 para ser múltiplo de 5`;
    }
  }
</script>
