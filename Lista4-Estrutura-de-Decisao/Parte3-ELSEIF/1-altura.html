<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 1</title>
  </head>

  <body>
    <h1>Altura e Esportes: Descubra Sua Vantagem Competitiva</h1>

    Informe a altura da pessoa (em metros):
    <input type="number" id="ipt_altura" /> <br />

    <button onclick="analisar()">Analisar Estatura</button>

    <div id="div_msg"></div>
  </body>
</html>

<script>
  function analisar() {
    let altura = Number(ipt_altura.value);

    if (altura <= 1.65) {
      div_msg.innerHTML = `Você pode ser piloto de corrida`;
    } else if (altura <= 1.8) {
      div_msg.innerHTML = `Você pode ser jogador de futebol`;
    } else {
      div_msg.innerHTML = `Você pode ser jogador de vôlei ou basquete`;
    }
  }
</script>
