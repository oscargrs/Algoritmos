<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <h1>Análise CNH</h1>

    Insira o seu nome:
    <input type="text" id="ipt_nome" /> <br>

    Insira a sua idade:
    <input type="number" id="ipt_idade" /> <br>

    <button onclick="avaliar()">Avaliar aluno</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function avaliar() {
        let nome = ipt_nome.value;
        let idade = Number(ipt_idade.value);

        if (idade >= 18) {
            div_mensagem.innerHTML = `${nome}, vamos tirar a CNH?`;
        }
        else {
            div_mensagem.innerHTML = `${nome}, vai jogar PlayStation!`;
        }
    }
</script>
