<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Conta de luz</h1>

    Insira a quantidade de kWh consumida no mês:
    <input type="number" id="ipt_consumo" />

    <button onclick="calcular()">Calcular conta de luz</button>
</body>
</html>

<script>
    function calcular() {
        let consumo = Number(ipt_consumo.value);
        let valorConta = consumo * 0.85;

        if (consumo < 100) {
            valorConta = valorConta * 0.9;
        }
        alert(`O valor da conta de luz é R$${valorConta}`);
    }
</script>
