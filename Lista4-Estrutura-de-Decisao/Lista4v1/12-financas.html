<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 12</title>
</head>
<body>
    <h1>Verificação das finanças</h1>

    Insira o seu saldo:
    <input type="number" id="ipt_saldo" /> <br>

    <button onclick="verificar()">Verificar finanças</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function verificar() {
        let saldo = Number(ipt_saldo.value);

        if (saldo == 0) {
            div_msg.innerHTML = `Conta zerada`;
        }
        else {
            if (saldo < 0) {
                div_msg.innerHTML = `<span style="color: red">Está devendo!</span>`;
            }
            else { // (saldo > 0) positivo
                div_msg.innerHTML = `<span style="color: blue">Saldo positivo! Sorriso</span>`;
            }
        }
    }
</script>
