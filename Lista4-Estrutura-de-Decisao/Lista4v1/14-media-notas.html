<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <h1>Análise da média de notas</h1>

    Insira a primeira nota:
    <input type="number" id="ipt_n1" /> <br>

    Insira a segunda nota:
    <input type="number" id="ipt_n2" /> <br>

    <button onclick="verificar()">Verificar situação</button>
</body>
</html>

<script>
    function verificar() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let media = (n1 + n2) / 2;

        if (media >= 6) {
            alert(`Parabéns, aprovado!`);
        }
        else {
            alert(`Tente outra vez...`);
        }
    }
</script>
