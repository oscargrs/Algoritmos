<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Rola a pizza? - parte - 2</h1>

    Insira o valor da pizza:
    <input type="number" id="ipt_valorPizza" /> <br>

    Insira a quantidade de amigos reunidos:
    <input type="number" id="ipt_qtdAmigos" /> <br> <br>

    <button onclick="divisaoPizza()">Rola a pizza?</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function divisaoPizza() {
        let valorPizza = Number(ipt_valorPizza.value);
        let qtdAmigos = Number(ipt_qtdAmigos.value);
        let divisao = valorPizza / qtdAmigos;

        div_mensagem.innerHTML = `Cada amigo vai pagar R$${divisao} pela pizza`;

        if (divisao > 20) {
//      div_mensagem.innerHTML += `<br><strong><em><span style="color: red;">Deu ruim! Pizza muito cara!</span></em></strong>`;
        div_mensagem.innerHTML += `<br><span style="color: red; font-weight: bold; font-style: italic;">Deu ruim! Pizza muito cara!</span>`;        }
    }
</script>
