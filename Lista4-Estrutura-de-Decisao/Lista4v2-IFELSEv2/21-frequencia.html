<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21</title>
</head>
<body>
    <h1>Análise de frequência do aluno</h1>    

    Informe a frequência do aluno:
    <input type="number" id="ipt_frequencia" /> <br>

    <button onclick="analisar()">Analisar frequência</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function analisar() {
        let freq = Number(ipt_frequencia.value);

        if (freq < 50) {
            div_msg.innerHTML = `<img src="turista.jpg">`;
        } else {
            div_msg.innerHTML = `<img src="aluno_estudioso.jpg">`
        }
    }
</script>
