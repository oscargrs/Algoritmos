<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 17</title>
</head>
<body>
    <h1>Par ou Impar</h1>    

    Informe um número:
    <input type="number" id="ipt_number" /> <br> <br>

    <button onclick="analisar()">Analisar</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function analisar() {
        let n = ipt_number.value % 2;

        if (n == 0) {
            div_msg.innerHTML = `<span style="color: red; background-color: yellow;">Esse número é PAR</span>`;
        }
        else {
            div_msg.innerHTML = `<span style="color: blue; font-weight: bold;">Esse número é IMPAR</span>`;
        }
    }
</script>
