<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <h1>Controle de horas assistindo streaming</h1>

    Insira o nome da ultima série SITCOM que você assistiu:
    <input type="text" id="ipt_serie" /> <br>

    Insira a quantidade total de episódios que você assistiu:
    <input type="number" id="ipt_qtdEpisodios" /> <br>

    <button onclick="verificar()">Verificar nível</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function verificar() {
        let serie = ipt_serie.value;
        let horas = (Number(ipt_qtdEpisodios.value) * 22) / 60;

        div_mensagem.innerHTML = `Vejo que você gosta da série ${serie}`;

        if (horas > 30) {
            div_mensagem.innerHTML += `<br>Uau, você realmente gosta dessa série!`;            
        }
    }
</script>
