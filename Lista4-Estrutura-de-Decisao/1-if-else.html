    <title>Exercício 1</title>

<body>
    <h1>IF / ELSE</h1>

    Insira a sua idade:
    <input type="number" id="ipt_idade" />

    <button onclick="verificar()">Ir pra festa</button>
</body>

<script>
    function verificar() {
        let idade = Number(ipt_idade.value);

        if (idade < 18) {
            alert(`Pedir permissão para o responsável`);
        }
        
        alert(`#partiuFesta`);
    }
</script>
