<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
</head>
<body>
    <h1>Controle de peso no elevador - v2</h1>    

    Informe a quantidade de homens no elevador:
    <input type="number" id="ipt_homens" /> <br>

    Informe a quantidade de mulheres no elevador:
    <input type="number" id="ipt_mulheres" /> <br> <br>

    <button onclick="ligar()">Ligar Elevador</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function ligar() {
        let pesoHomens = Number(ipt_homens.value) * 90;
        let pesoMulheres = Number(ipt_mulheres.value) * 70;
        
        let pesoTotal = pesoHomens + pesoMulheres;

        if (pesoTotal <= 500) {
            div_msg.innerHTML = `<span style="color: green;">Elevador vai se mover, pois está com ${pesoTotal}kg</span>`;
        } else {
            let excesso = pesoTotal - 500;

            div_msg.innerHTML = `<span style="color: red;"> Alguém precisa descer. Precia perder ${excesso}kg para mover o elevador</span>`;
        }
    }
</script>
