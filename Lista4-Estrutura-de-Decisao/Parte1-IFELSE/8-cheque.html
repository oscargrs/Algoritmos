<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h1>Cheque especial</h1>

    Insira o saldo da conta:
    <input type="number" id="ipt_saldo" /> <br>

    Insira o valor do débito:
    <input type="number" id="ipt_debito" /> <br>

    <button onclick="analisar()">Analisar conta</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function analisar() {
        let saldo = Number(ipt_saldo.value);
        let debito = Number(ipt_debito.value);
        saldo -= debito;

        if (saldo < 0) {
            div_mensagem.innerHTML = `<span style="color: red; font-weight: bold">O saldo atual da conta corrente é R$${saldo}</span>`;
        }
        else {
            div_mensagem.innerHTML = `O saldo atual da conta corrente é R$${saldo}`;
        }
    }
</script>
