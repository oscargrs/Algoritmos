<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Controle de notas</h1>

    Insira o valor da primeira nota:
    <input type="number" id="ipt_nota1" /> <br>

    Insira o valor da segunda nota:
    <input type="number" id="ipt_nota2" /> <br>

    Insira o valor da terceira nota:
    <input type="number" id="ipt_nota3" /> <br>

    <button onclick="analise()">Analisar desempenho</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function analise() {
        let n1 = Number(ipt_nota1.value);
        let n2 = Number(ipt_nota2.value);
        let n3 = Number(ipt_nota3.value);
        let media = (n1 + n2 + n3) / 3;

        div_mensagem.innerHTML = `Sua média foi de ${media}`;

        if (media > 9.4) {
            div_mensagem.innerHTML += `<br>Parabéns, você é fora de série!`;
        }
    }
</script>
