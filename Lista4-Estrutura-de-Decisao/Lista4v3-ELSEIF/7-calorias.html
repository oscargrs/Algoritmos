<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>Consumo de Calorias: Sua Dieta Está Saudável?</h1>

    Informe quantos pães franceses você tem comido por dia:
    <input type="number" id="ipt_pao"> <br>

    Informe quantos pacotes de bolacha recheada você tem comido por dia:
    <input type="number" id="ipt_bolacha"> <br>

    Informe quantos copos de achocolatado você tem tomado por dia:
    <input type="number" id="ipt_toddy"> <br>

    <button onclick="verificar()">Verificar calorias</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function verificar() {
        let pao = Number(ipt_pao.value) * 50;
        let bolacha = Number(ipt_bolacha.value) * 80;
        let toddy = Number(ipt_toddy.value) * 70;

        let calorias = pao + bolacha + toddy;

        if (calorias < 200) {
            div_msg.innerHTML = `Parabéns, vai ficar em forma!`;
        } else if (calorias <= 400) {
            div_msg.innerHTML = `Cuidado, vai ficar menos saudável!`;
        } else {
            div_msg.innerHTML = `Alerta crítico de saúde !!!`;
        }
    }
</script>
