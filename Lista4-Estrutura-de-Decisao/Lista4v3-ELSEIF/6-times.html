<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Times Paulistas: O Canto da Sua Torcida!</h1>

    Informe o time que você torce (São Paulo, Palmeiras, Corinthians, Santos):
    <input type="text" id="ipt_time"> <br>

    <button onclick="falar()">Falar sobre esse time</button> <br>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function falar() {
        let time = ipt_time.value;

        if (time == 'Corinthians') {
            div_msg.innerHTML = `<span style="background-color: black; color: white">Salve o Corinthians</span>`;
        } else if (time == 'Palmeiras') {
            div_msg.innerHTML = `<span style="background-color: green; color: white">Salve o alviverde imponente</span>`;
        } else if (time == 'Santos') {
            div_msg.innerHTML = `<span style="background-color: white; color: black">Agora quem dá a bola é o Santos</span>`;
        } else if (time == 'São Paulo') {
            div_msg.innerHTML = `<span style="background-color: black; color: red">Salve o Tricolor paulista</span>`;
        }
    }
</script>
