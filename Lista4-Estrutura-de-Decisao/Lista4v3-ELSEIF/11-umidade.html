<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <h1>Controle da umidade do ar</h1>

    Informe a umidade atual do ambiente:
    <input type="number" id="ipt_umidade"> <br>

    <button onclick="verificar()">Verificar umidade</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function verificar() {
        let umidade = Number(ipt_umidade.value);

        if (umidade < 0) {
            alert(`Erro! Valor abaixo de 0.`);
        } else if (umidade > 100) {
            alert(`Erro! Valor acima de 100.`);
        } else if (umidade < 12) {
            div_msg.innerHTML = `Estado de Emergencia`;        
        } else if (umidade <= 20) {
            div_msg.innerHTML = `Estado de alerta`;
        } else if (umidade <= 30) {
            div_msg.innerHTML = `Estado de atenção`;
        } else {
            div_msg.innerHTML = `Nenhum risco`;
        }
    }
</script>
