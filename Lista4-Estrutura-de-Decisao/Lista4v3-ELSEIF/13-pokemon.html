<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>

<body>
    <h1>Imagem do Pokémon selecionado</h1>

    Informe seu Pokémon inicial:

    <input type="text" id="ipt_pokemon"> <br>

    <button onclick="escolher()">Escolher Pokémon</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function escolher() {
        let pokemon = ipt_pokemon.value;

        if (pokemon == 'Bulbasaur') {
            div_msg.innerHTML = `<img src="./img/Bulbasaur.png">`;
        } else if (pokemon == 'Charmander') {
            div_msg.innerHTML = `<img src="./img/Charmander.png">`;
        } else if (pokemon == 'Squirtle') {
            div_msg.innerHTML = `<img src="./img/Squirtle.png">`;
        } else {
            div_msg.innerHTML = `Pokémon não reconhecido.`;
        }
    }
</script>
