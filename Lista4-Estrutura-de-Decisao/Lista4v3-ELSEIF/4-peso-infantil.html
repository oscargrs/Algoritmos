<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>

<body>
    <h1>Avaliação de Peso Infantil: Está Dentro da Faixa Saudável?</h1>

    Informe o peso da criança:
    <input type="number" id="ipt_peso"> <br>

    <button onclick="avaliar()">Avaliar</button> <br>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function avaliar() {
        let peso = Number(ipt_peso.value);

        if (peso == 18.3) {
            div_msg.innerHTML = `Peso perfeito`;
        } else if (peso <= 13.5) {
            div_msg.innerHTML = `Abaixo do peso`;
        } else if (peso <= 21.2) {
            div_msg.innerHTML = `Peso na média`;
        } else {
            div_msg.innerHTML = `Acima do peso`;
        }
    }
</script>
