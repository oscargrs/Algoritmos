<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>

<body>
    <h1>Sensação Térmica: Como o Corpo Humano Percebe a Temperatura</h1>

    Informe a temperatura:
    <input type="number" id="ipt_temp" /> <br>

    <button onclick="verificar()">Verificar Temperatura</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function verificar() {
        let temp = Number(ipt_temp.value);

        if (temp <= 13) {
            div_msg.innerHTML = `Congelante`;
        } else if (temp <= 21) {
            div_msg.innerHTML = `Com frio`;
        } else if (temp <= 24) {
            div_msg.innerHTML = `Confortável`;
        } else if (temp <= 31) {
            div_msg.innerHTML = `Com calor`;
        } else {
            div_msg.innerHTML = `Calor escaldante`;
        }
    }
</script>
