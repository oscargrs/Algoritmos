<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>

<body>
    <h1>Meta de Economia: Você Está no Caminho Certo?</h1>

    Informe a sua meta de economia:
    <input type="number" id="ipt_meta"> <br>

    Informe o quanto você tem guardado:
    <input type="number" id="ipt_guardado"> <br>

    <button onclick="analisar()">Analisar economia</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function analisar() {
        let meta = Number(ipt_meta.value);
        let guardado = Number(ipt_guardado.value);

        if (guardado >= meta) {
            div_msg.innerHTML = `Parabéns, meta alcançada!`;

            if (guardado > meta) {
                div_msg.innerHTML += `Meta ultrapassada em ${guardado - meta}`;
            }
        } else {
            div_msg.innerHTML = `Força! Ainda em busca da meta! Falta ${meta - guardado}`;
        }
    }
</script>
