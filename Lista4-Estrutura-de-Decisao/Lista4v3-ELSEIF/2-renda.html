<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Classe Social em Tuvalu: Em Qual Você se Encaixa?</h1>

    Informe a renda familiar mensal:
    <input type="number" id="ipt_renda" /> <br>

    <button onclick="analisar()">Analisar Renda</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function analisar() {
        let renda = Number(ipt_renda.value);

        if (renda <= 250) {
            div_msg.innerHTML = `Classe E`;
        } else if (renda <= 900) {
            div_msg.innerHTML = `Classe D`;
        } else if (renda <= 2500) {
            div_msg.innerHTML = `Classe C`;
        } else if (renda <= 9500) {
            div_msg.innerHTML = `Classe B`;
        } else {
            div_msg.innerHTML = `Classe A`;
        }
    }
</script>
