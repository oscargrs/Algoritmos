<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Filmes em Cores: Azul e Vermelho Alternados</h1>

    Informe o nome dos filmes que você mais gosta (um de cada vez):
    <input type="text" id="ipt_filme"> <br>
    <button onclick="cadastrar()">Cadastrar</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    let favoritos = [];

    function cadastrar() {
        let filme = ipt_filme.value;        
        favoritos.push(filme);
        exibir.innerHTML = '';
        for (i = 0; i < favoritos.length; i++) {
            if (i % 2 == 0) {
                exibir.innerHTML += `<p style="color: blue;">${favoritos[i]}</p>`;
            } else {
                exibir.innerHTML += `<p style="color: red;">${favoritos[i]}</p>`;
            }            
        }
    }
</script>
