<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Lista Viva de Filmes Favoritos</h1>

    Informe o nome dos filmes que você mais gosta (um de cada vez):
    <input type="text" id="ipt_filme"> <br>
    <button onclick="cadastrar()">Cadastrar</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    let favoritos = [];

    function cadastrar() {
        let filme = ipt_filme.value;
        favoritos.push(filme);
        exibir.innerHTML = favoritos.toString().replaceAll(',', '<br>');
    }
</script>
