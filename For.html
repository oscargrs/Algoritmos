<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução a FOR</title>
</head>
<body>
    <button onclick="contar()">Contar</button>
    <div id="div_msg"></div>
</body>
</html>

<script>
    function contar() {
        let mensagem = ``;

        for (let contador = 0; contador < 5; contador++) {
            mensagem += `Contador: ${contador} <br>`;
            div_msg.innerHTML = mensagem;
        }
    }
</script>
