<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Depósito e Retirada de dinheiro</h1>

    Insira o valor a ser depositado ou retirado:
    <input type="number" id="ipt_valor" />

    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let saldo = 0;

    function depositar() {
        let deposito = Number(ipt_valor.value);
        saldo += deposito;

        div_mensagem.innerHTML = `Depósito de R$${deposito} efetuado! Saldo atual: R$${saldo}`
    }

    function retirar() {
        let retirada = Number(ipt_valor.value);
        saldo -= retirada;

        div_mensagem.innerHTML = `Retirada de R$${retirada} efetuada! Saldo atual: R$${saldo}`;
    }
</script>
