<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Sortear Time</h1>

    <button onclick="sortear()">Sortear Time</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function sortear() {
        let n = Math.random();
        let min = 1;
        let max = 4;
        let intervalo = max - min; 
        let formatado = n * intervalo + min;
        let inteiro = formatado.toFixed();
    
        exibir.innerHTML = inteiro;
    }
</script>
