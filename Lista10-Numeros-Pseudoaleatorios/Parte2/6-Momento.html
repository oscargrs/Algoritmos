<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício 6</title>
    </head>
    <body>
        <h1>Momento do dia</h1>

        <button onclick="sortear()">Sortear momento do dia</button>

        <div id="exibir"></div>
    </body>
</html>

<script>
    function sortear() {
        let h = Math.random();
        h = h * 24;
        h = Number(h.toFixed());

        if (h > 23) {
            h = 23;
        }

        let frase = "";

        if (h <= 11) {
            frase = `Bom dia, flor do dia, são ${h}h!`;
        } else if (h <= 17) {
            frase = `Boa tarde, já vai tarde! São ${h}h!`;
        } else {
            frase = `Boa noite, durma bem! São ${h}h!`;
        }

        exibir.innerHTML = `${frase}`;
    }
</script>

<!--
6. Sortear momento do dia
a) Ao clicar no botão "Sortear momento do dia", gera uma hora aleatória entre 0 e 23.
b) Exibe frase de acordo com o período do dia, onde X é a hora sorteada.
-->
