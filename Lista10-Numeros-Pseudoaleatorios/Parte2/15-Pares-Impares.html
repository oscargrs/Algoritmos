<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício 15</title>
    </head>
    <body>
        <h1>Pares e ímpares</h1>

        <div id="contadores">
            Números pares: 0<br>
            Números ímpares: 0
        </div>
        <br>

        <button onclick="sortear()">Sortear número</button>

        <div id="exibir"></div>
    </body>
</html>

<script>
    let pares = 0;
    let impares = 0;

    function sortear() {
        let n = Math.random() * 22 - 30.5;
        n = Number(n.toFixed());

        if (n % 2 == 0) {
            pares++;
        } else {
            impares++;
        }

        contadores.innerHTML = `Números pares: ${pares}<br>Números ímpares: ${impares}`;
        exibir.innerHTML = `${n}`;
    }
</script>

c) Atualiza contador de pares ou ímpares cumulativamente.
