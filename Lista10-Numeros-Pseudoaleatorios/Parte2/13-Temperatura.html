<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício 13</title>
    </head>
    <body>
        <h1>Temperatura</h1>

        <button onclick="sortear()">Sortear temperatura</button>

        <div id="exibir"></div>
    </body>
</html>

<script>
    function sortear() {
        let t = Math.random() * 41 - 20.5;
        t = Number(t.toFixed());

        let msg = "";

        if (t < 1) {
            msg = "Dá pra conservar qualquer alimento";
        } else if (t <= 10) {
            msg = "Conserva a maioria dos alimentos";
        } else {
            msg = "Estraga a maioria dos alimentos";
        }

        exibir.innerHTML = `Temperatura sorteada: ${t}<br>${msg}`;
    }
</script>

<!--
13. Temperatura
a) Sorteia temperatura real entre -20 e +20, exibe como inteiro.
b) Exibe mensagem de conservação de acordo com a faixa.
-->
