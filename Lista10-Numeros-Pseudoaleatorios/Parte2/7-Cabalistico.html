<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício 7</title>
    </head>
    <body>
        <h1>Número cabalístico</h1>

        <button onclick="sortear()">Quero um número cabalístico!</button>

        <div id="exibir"></div>
    </body>
</html>

<script>
    function sortear() {
        let n = Math.random() * 15 + 1 - 0.5;
        n = Number(n.toFixed());

        let frase = "";

        if (n == 3 || n == 4 || n == 7 || n == 10 || n == 12) {
            frase = "Eu S2 números cabalísticos!";
        } else {
            frase = "Ah, me dá um número bom na próxima!";
        }

        exibir.innerHTML = `${n}<br>${frase}`;
    }
</script>

<!--
7. Número cabalístico
a) Sorteia número entre 1 e 15.
b) Se for 3, 4, 7, 10 ou 12: "Eu S2 números cabalísticos!"
c) Caso contrário: "Ah, me dá um número bom na próxima!"
-->
