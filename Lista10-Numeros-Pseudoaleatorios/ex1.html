<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Sorteador</h1>
    <button onclick="sortear()">Sortear</button><br><br>
    <div id="exibir"></div>
</body>
</html>

<script>
    function sortear() {
        let n = Math.random();

        if (n > 0.5) {
            exibir.innerHTML = `Eu arredondaria para 1`;
        } else {
            exibir.innerHTML = `Eu arredondaria para 0`;
        }
    }
</script>

<!--
1. Crie um programa o qual:  
a) Ao clicar em um botão "Sortear", apareça na página um número aleatório, entre 0 e 0.9999;  

b) Se esse número for maior que 0.5, exibir, abaixo, a frase "Eu arredondaria para 1".  Caso contrário, exiba "Eu arredondaria para 0". 
-->
