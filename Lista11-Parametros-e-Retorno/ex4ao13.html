<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios do 4 ao 13</title>
    <style>* {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}</style>
</head>
<body>
    <h1>Exercícios 4 ao 13</h1>
    <button onclick="invocar()">Invocar funções</button>
    <div id="exibir"></div>
</body>
</html>

<script>
    function invocar() {
        let numeros = [34, 67, 2, 100, 56, 19, 73, 41, 0, 92, 65, 28];
        let valor = 67;
        
        exibir.innerHTML = `
        <b>Números ==> 34, 67, 2, 100, 56, 19, 73, 41, 0, 92, 65, 28</b> <br><br>

        4) Crie uma função que receba um vetor de números e retorne a soma de todos os elementos do vetor. <br>
            <b>O resultado da soma de todos os elementos do vetor é de: ${somar(numeros)}</b>
        <br><br>
        5) Crie uma função que receba um vetor de números e retorne o maior valor presente no vetor. <br>
            <b>O maior valor presente no vetor é: ${maior(numeros)}</b>
        <br><br>
        6) Crie uma função que receba um vetor de números e retorne o menor valor presente no vetor. <br>
            <b>O menor valor presente no vetor é: ${menor(numeros)}</b>
        <br><br>
        7) Crie uma função que receba um vetor de números e retorne a média dos valores. <br>
            <b>A média dos valores é de: ${media(numeros)}</b>
        <br><br>
        8) Crie uma função que receba um vetor de números e retorne um novo vetor contendo apenas os números pares do vetor original. <br>
            <b>Os números pares do vetor original são: ${pares(numeros)}</b>
        <br><br>
        9) Crie uma função que receba um vetor de números e retorne um novo vetor contendo apenas os números ímpares do vetor original. <br>
            <b>Os números ímpares do vetor original são: ${impares(numeros)}</b>
        <br><br>
        10) Crie uma função que receba um vetor de números e retorne a quantidade de elementos pares no vetor. <br>
            <b>A quantidade de elementos pares no vetor é de: ${qtdPares(numeros)}</b>
        <br><br>
        11) Crie uma função que receba um vetor de números e retorne a quantidade de elementos ímpares no vetor. <br>
            <b>A quantidade de elementos ímpares no vetor é de: ${qtdImpares(numeros)}</b>
        <br><br>
        12) Crie uma função que receba um vetor de números e um valor, e retorne a quantidade de vezes que esse valor aparece no vetor. <br>
            <b>Valor: ${valor}<br>
            A quantidade de vezes que esse valor aparece no vetor é de: ${qtdValor(numeros, valor)}</b>
        <br><br>
        13) Crie uma função que receba um vetor de números e retorne true se todos os elementos do vetor forem positivos, ou false caso contrário. <br>
            <b>Todos os números são positivos? (OBS: o número 0 é considerado um número neutro, e não um número positivo) <br>${poun(numeros)}</b>
        `;
    }

// 4) Crie uma função que receba um vetor de números e retorne a soma de todos os elementos do vetor.
    function somar(numeros) {
        let soma = 0;
        for (let i = 0; i < numeros.length; i++) {
            soma += numeros[i];          
        }
        return soma;
    }

// 5) Crie uma função que receba um vetor de números e retorne o maior valor presente no vetor.
    function maior(numeros) {
        let maior = numeros[0];
        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] > maior) {
                maior = numeros[i];
            }
        }
        return maior;
    }

// 6) Crie uma função que receba um vetor de números e retorne o menor valor presente no vetor.
    function menor(numeros) {
        let menor = numeros[0];
        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] < menor) {
                menor = numeros[i];
            }
        }
        return menor;
    }

// 7) Crie uma função que receba um vetor de números e retorne a média dos valores.
    function media(numeros) {
        soma = somar(numeros);
        mediaNum = soma / numeros.length;
        return mediaNum;
    }

// 8) Crie uma função que receba um vetor de números e retorne um novo vetor contendo apenas os números pares do vetor original.
    function pares(numeros) {
        let par = [];
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] % 2 == 0) {
                par.push(numeros[i]);
            }
        }
        return par;
    }

// 9) Crie uma função que receba um vetor de números e retorne um novo vetor contendo apenas os números ímpares do vetor original.
    function impares(numeros) {
        let impar = [];
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] % 2 != 0) {
                impar.push(numeros[i]);
            }
        }
        return impar;
    }

// 10) Crie uma função que receba um vetor de números e retorne a quantidade de elementos pares no vetor.
    function qtdPares(numeros) {
        let pares = 0;
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] % 2 == 0) {
                pares ++;
            }
        }
        return pares;
    }

// 11) Crie uma função que receba um vetor de números e retorne a quantidade de elementos ímpares no vetor.
    function  qtdImpares(numeros) {
        let impares = 0;
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] % 2 != 0) {
                impares ++;
            }
        }
        return impares;
    }

// 12) Crie uma função que receba um vetor de números e um valor, e retorne a quantidade de vezes que esse valor aparece no vetor.
    function qtdValor(numeros, valor) {
        let cont = 0;
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] == valor) {
                cont += 1;
            }
        }
        return cont;
    }

// 13) Crie uma função que receba um vetor de números e retorne true se todos os elementos do vetor forem positivos, ou false caso contrário.
    function poun(numeros) {
        let cont = 0;
        for (let i = 0; i < numeros.length; i++) {
            if (numeros[i] > 0) {
                cont += 1;
            }
        }
        if (cont == numeros.length) {
            return true;
        }
        return false;
    }

</script>
