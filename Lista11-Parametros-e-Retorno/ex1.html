<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="ipt_n" placeholder="Digite um número...">
    <button onclick="exibir()">Positivo ou Negativo?</button>
    <div id="exibirr"></div>
</body>
</html>

<script>
    function exibir() {
        let n = Number(ipt_n.value);
        teste = poun(n);
        exibirr.innerHTML = `${teste}`;
    }

    function poun(pam) {
        if (pam >= 0) {
            return true;
        }

        return false;
    }
</script>

<!--
1) Crie uma função que receba um número e retorne true caso o número seja positivo e false caso contrário.
-->
