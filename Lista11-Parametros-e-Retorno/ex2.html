<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Exercício 2</h1>
    <input type="text" id="ipt_text" placeholder="Digite...">
    <button onclick="exibir()">Tem vogal???</button>
    <div id="msg"></div>
</body>
</html>

<script>
    function vogal(text) {
        for (let i = 0; i < text.length; i++) {
            letra = text[i];
            if (
                letra == 'a' ||
                letra == 'e' ||
                letra == 'i' ||
                letra == 'o' ||
                letra == 'u'
            ) {
                return true;
            }
        }

        return false;
    }
    
    function exibir() {
        let text = ipt_text.value;
        msg.innerHTML = `${vogal(text)}`;
    }
</script>
