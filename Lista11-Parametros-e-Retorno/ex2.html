<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_text" placeholder="Digite...">
    <button onclick="vogal()">Tem vogal???</button>
    <div id="msg"></div>
</body>
</html>

<script>
    
    function vogal() {
        let text = ipt_text.value;
        for (let i = 0; i < text.length; i++) {
            letra = text[i];
            if (
                letra == 'a' ||
                letra == 'e' ||
                letra == 'i' ||
                letra == 'o' ||
                letra == 'u'
            ) {
                return true;
            }
        }

        return false;
        exibir();
    }

    function exibir() {
        msg.innerHTML = `${vogal()}`;
    }
</script>
