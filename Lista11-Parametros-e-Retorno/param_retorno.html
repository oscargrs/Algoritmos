<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parâmetros e Retorno</title>
</head>
<body>
    <h1>Parâmetros e Retorno</h1>

    <input type="number" id="ipt_n1" placeholder="Primeiro número...">
    <input type="number" id="ipt_n2" placeholder="Segundo número...">

    <button onclick="calc()">Calcular</button>
    <br><br>

    <div id="msg"></div>
</body>
</html>

<script>
    function calc() {
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);

        let soma = somar(n1, n2);
        let subtracao = subtrair(n1, n2);
        let multiplicacao = multiplicar(n1, n2);
        let divisao = dividir(n1, n2);

        msg.innerHTML = `
            Entradas: ${n1} e ${n2} <br>
            Soma: ${soma} <br>
            Subtracao: ${subtracao} <br>
            Multiplicacao: ${multiplicacao} <br>
            Divisão: ${divisao}`
    }

    function somar(param1, param2) {
        return param1 + param2;
    }

    function subtrair(param1, param2) {
        return param1 - param2;
    }

    function multiplicar(param1, param2) {
        return param1 * param2;
    }
    
    function dividir(param1, param2) {
        return param1 / param2;
    }
</script>
