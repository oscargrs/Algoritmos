<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
  let qualidade = ipt_qualidade.value;
  let qtdTelas = Number(ipt_qtd_telas.value);
  let qtdTelasExtras = Number(ipt_qtd_telas_extras.value);
  let download = ipt_download.value;
  let valorBase = 15;
  let valorTelas = 30;

  if (qualidade == `1080p`) {
    valorBase = 20;
  } else {
    if (qualidade == `4K`) {
      valorBase = 25;
    } 
  }

  if (qtdTelas <= 2) {
    valorTelas = 10;
  } else {
    if (qtdTelas <= 4) {
      valorTelas = 20;
    }
  }

  let qtdTotalTelas = qtdTelas + qtdTelasExtras;
  let valorTotalTelas = valorTelas + qtdTelasExtras * 12.9;
  let valorTotal = valorBase + valorTotalTelas;

  div_mensagem.innerHTML = `O valor base do seu plano é R$${valorBase}`;
  div_mensagem.innerHTML += `<br>O valor das telas do seu plano é R$${valorTotalTelas}`;

  if (download == `sim`) {
    let porcentagemAcrescimo = 5 + qtdTotalTelas;
    valorTotal += valorTotal * (porcentagemAcrescimo / 100);

    div_mensagem.innerHTML += `<br>Você optou por fazer download e por isso sua conta irá subir em ${porcentagemAcrescimo}%`;
  }

  if (download == `nao`) {
    valorTotal -= valorTotal * 0.1;

    div_mensagem.innerHTML += `<br>Você optou por não fazer download e por isso sua conta será reduzida em 10%`;
  }
  
  div_mensagem.innerHTML += `<br>Valor final R$${valorTotal}`;

  if (qtdTotalTelas > 0) {
    div_mensagem.innerHTML += `<br>Se quiser dividir fica R$${valorTotal / qtdTotalTelas}`;
  } 
}
</script>
