<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Auxílio Emergencial Covid-19</h1>

    Renda individual:
    <input type="number" id="ipt_rendaIndividual"> <br>

    Renda familiar:
    <input type="number" id="ipt_rendaFamiliar"> <br>

    <button onclick="avaliar()">Terei o benefício</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function avaliar() {
        let rendaIndividual = Number(ipt_rendaIndividual.value);
        let rendaFamiliar = Number(ipt_rendaFamiliar.value);

        if (rendaIndividual <= 2000 || rendaFamiliar <= 3000) {
            div_msg.innerHTML = `Você terá direito ao auxílio`;
        } else {
            div_msg.innerHTML = `Sem direito ao auxílio`;
        }
    }
</script>
