<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Processo Seletivo Mentes Brilhantes</h1>

    Nota do ENEM:
    <input type="number" id="ipt_enem"> <br>

    Nota do vestibular interno:
    <input type="number" id="ipt_interno"> <br>

    <button onclick="avaliacao()">Avaliação</button>
</body>
</html>

<script>
    function avaliacao() {
        let enem = Number(ipt_enem.value);
        let interno = Number(ipt_interno.value);

        if (enem >= 800 || interno >= 700) {
            alert(`Parabéns! Aprovado`)
        } else {
            alert(`Tente semestre que vem!`);
        }
    }
</script>
