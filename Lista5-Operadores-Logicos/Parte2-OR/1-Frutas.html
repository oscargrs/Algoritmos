<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Juliane Joada e Suas Frutas Preferidas</h1>

    Fruta (uva ou abacaxi):
    <input type="text" id="ipt_fruta"> <br>

    <button onclick="comer()">Vai comer?</button>
</body>
</html>

<script>
    function comer() {
        let fruta = ipt_fruta.value;

        if (fruta == 'uva' || fruta == 'abacaxi') {
            alert(`Sim, vai comer ${fruta}`);
        } else {
            alert(`A fruta ${fruta} ela não come`);
        }
    }
</script>
