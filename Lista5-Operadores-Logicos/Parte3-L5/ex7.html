<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>Autenticação Segura com Tentativas Limitadas</h1>

    Insira seu login:
    <input type="text" id="ipt_login" placeholder="Login"> <br>

    Insira sua senha:
    <input type="text" id="ipt_senha" placeholder="Senha"> <br>

    Informação pessoal:
    <input type="text" id="ipt_info"> <br>

    <button onclick="autenticar()">Autenticar</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let tentativas = 3;

    function autenticar() {
        let login = ipt_login.value;
        let senha = ipt_senha.value;
        let info = ipt_info.value;

        if (tentativas > 0) {
            if (login == 'ana' && senha == 'braga' && (info == '1949' || info == 'louro josé')) {
                tentativas = 3;
                div_msg.innerHTML = `Usuário autenticado`;
            } else {
                tentativas --;
                div_msg.innerHTML = `Falha na autenticação`;
                div_msg.innerHTML += `<br>Você ainda tem ${tentativas} tentativa(s)`;
            }
        } else {
           div_msg.innerHTML = `Usuário BLOQUEADO! Procure seu gerente!`;
        }
    }
</script>

<!--
7. Autenticação Segura com Tentativas Limitadas
Melhore o exercício 4, de tal forma que: 

a) Sempre que ocorrer uma falha na autenticação, 
deve aparecer abaixo da frase de "Falha de autenticação" uma outra frase, como esta: 

            Você ainda tem 2 tentativa(s) 

b) A ideia é que o usuário tem 3 tentativas de autenticação. 
Sempre que errar novamente na autenticação, o "contador" de tentativas reduz em 1 na tela. 

c) Uma vez que se esgotarem as tentativas, deve surgir mais uma frase abaixo, que seria 

     Usuário BLOQUEADO! Procure seu gerente! 

d) Em caso de usuário bloqueado, não adianta nem tentar fazer uma autenticação 
com as credenciais corretas, que nada mais acontecerá 

e) Caso o usuário autentique com sucesso, sem que tenham sido queimadas as 3 tentativas, 
a mensagem de autenticação aparece normalmente e a frase com a quantidade de tentativas 
deve sumir da tela e deve ser "reiniciada" para as próximas falhas. 
-->
