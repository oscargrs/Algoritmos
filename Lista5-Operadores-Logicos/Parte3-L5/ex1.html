<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>

<body>
    <h1>Sistema de Avaliação de Atendimento: Dê Sua Nota! </h1>

    Nota:
    <input type="number" id="ipt_nota"> <br>

    <button onclick="avaliar()">Avaliar Atendimento</button> <br>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function avaliar() {
        let nota = Number(ipt_nota.value);

        if (nota > 10 || nota < 0) {
            div_msg.innerHTML = `Nota inválida`;
        } else if (nota < 5) {
            div_msg.innerHTML = `Não Aprovado`;
        } else if (nota <= 6) {
            div_msg.innerHTML = `Neutro`;
        } else {
            div_msg.innerHTML = `Aprovado`;
        }
    }
</script>
