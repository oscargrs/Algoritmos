<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Simulador de Preferências de Compras: Será que Robervaldo Gostaria?</h1>

    Tamanho tela:
    <input type="number" id="ipt_tela"> <br>

    Cor:
    <select id="select_cor">
        <option>Preto</option>
        <option>Prata</option>
        <option>Azul</option>
        <option>Vermelho</option>
    </select>

    <button onclick="gosta()">Será que ele gosta?</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function gosta() {
        let tela = Number(ipt_tela.value);
        let cor = select_cor.value;

        if (tela > 6.5 && (cor == 'Preto' || cor == 'Prata')) {
            div_msg.innerHTML = `<img src="./img/Feliz.png">blob`;
        } else {
            div_msg.innerHTML = `<img src="./img/Decepcionada.png">davuhS`;
        }
    }
</script>

<!--
Robervaldo prefere celulares com tela grande (acima de 6.5 polegadas) e
que sejam da cor preta ou prata.

Com base nessas informações, crie um simulador no qual:

a) Solicite o tamanho da tela do celular encontrado.

b) Solicite a cor do celular encontrado, dentre as opções:
Preto Prata Azul Vermelho

c) Ao clicar em "Será que ele gosta?", mostre, abaixo:

A imagem de uma pessoa feliz, caso as características do celular coincidam com as preferências de Robervaldo.
Ou a imagem de uma pessoa decepcionada, caso contrário.  
-->
