<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>

<body>
    <h1>Simulador de Preço do Bilhete Único de São Paulo</h1>

    <select id="select_passageiro">
        <option>Comum</option>
        <option>Estudante</option>
        <option>Idoso/PNE</option>
    </select> <br>

    <select id="select_passagem">
        <option>Passagem única</option>
        <option>Passagem integração</option>
    </select> <br>

    <button onclick="simular()">Simular preço</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function simular() {
        let passageiro = select_passageiro.value;
        let passagem = select_passagem.value;
        let unica = 4.4;
        let integracao = 5.9;

        if (passageiro == 'Comum') {
            if (passagem == 'Passagem única') {
                div_msg.innerHTML = `Valor da passagem escolhida: R$${unica}`;
            } else {
                div_msg.innerHTML = `Valor da passagem escolhida: R$${integracao}`;
            }
        } else if (passageiro == 'Estudante') {
            if (passagem == 'Passagem única') {
                div_msg.innerHTML = `Valor da passagem escolhida: R$${unica * 0.5}`;
            } else {
                div_msg.innerHTML = `Valor da passagem escolhida: R$${integracao * 0.5}`;
            }
        } else {
        div_msg.innerHTML = `Passagem gratuita`; 
        }
    }
</script>

<!--
3. Simulador de Preço do Bilhete Único de São Paulo
Crie um pequeno simulador de preço de passagem de Bilhete Único de São Paulo num programa, o qual: 

a) Tenha uma combo para indicar o tipo de passageiro, com os itens 
            Comum 
            Estudante 
            Idoso/PNE 

b) Tenha uma outra combo, para indicar o tipo de passagem, com os itens 
            Passagem única 
            Passagem integração 

c) Ao clicar num botão "Simular preço", considere que o preço unitário de uma passagem 
única é R$4,40 e que a integração é R$5,90 para fazer os cálculos necessários 
para exibir uma frase como esta: 
            Valor da passagem escolhida: R$X,XX 

d) Considere ainda que um estudante tem 50% de desconto e idoso/PNE possuem gratuidade 
em qualquer tipo de passagem 
-->
