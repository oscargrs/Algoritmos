<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 6</title>
  </head>

  <body>
    <h1>Desempenho Escolar: O Aluno Foi Aprovado?</h1>

    Insira a nota:
    <input type="number" id="ipt_nota" /> <br />

    Insira a frequência:
    <input type="number" id="ipt_freq" /> <br />

    <button onclick="analisar()">Analisar aluno</button>

    <div id="div_msg"></div>
  </body>
</html>

<script>
  function analisar() {
    let nota = Number(ipt_nota.value);
    let freq = Number(ipt_freq.value);

    if (nota < 0 || nota > 10) {
      alert(`Onde já se viu nota <0 ou >10?!`);
      div_msg.innerHTML = ``;
    } else if (nota < 6) {
      div_msg.innerHTML = `Aluno ficou abaixo da média`;
    } else if (nota <= 8) {
      div_msg.innerHTML = `Aluno ficou na média`;
    } else if (nota <= 10) {
      div_msg.innerHTML = `Aluno acima da média`;
    }

    if (nota >= 0 && nota <= 10) {
      if (freq < 0 || freq > 100) {
        alert(`Onde já se viu frequência <0 ou >100?!`);
        div_msg.innerHTML = ``;
      } else if (freq >= 75) {
        div_msg.innerHTML += `<br>Aluno aprovado por frequência`;
      } else {
        div_msg.innerHTML += `<br>Aluno reprovado por frequência`;
      }
    }
  }
</script>
