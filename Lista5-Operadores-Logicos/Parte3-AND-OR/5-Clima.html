<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 5</title>
  </head>
  <body>
    <h1>Avaliação do Clima: Está Agradável ou Desconfortável?</h1>

    Informe a temperatura:
    <input type="number" id="ipt_temp" /> <br />

    Informe a umidade:
    <input type="number" id="ipt_umidade" /> <br />

    <button onclick="avaliar()">Avaliar clima</button> <br />

    <div id="div_msg"></div>
  </body>
</html>

<script>
  function avaliar() {
    let temp = Number(ipt_temp.value);
    let umidade = Number(ipt_umidade.value);

    if (umidade < 0 || umidade > 100) {
      alert(`Valor de umidade inválido`);
      div_msg.innerHTML = ``;
    } else if (temp >= 22 && temp <= 23 && umidade < 60) {
      div_msg.innerHTML = `Clima agradável`;
    } else {
      div_msg.innerHTML = `Clima desconfortável`;
    }
  }
</script>
