<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Validação de Notas: Seu Resultado é Aceitável?</h1>

    Nota:
    <input type="Number" id="ipt_nt"> <br>

    <button onclick="avaliar()">Avaliar aluno</button>
</body>
</html>

<script>
    function avaliar() {
        let nt = Number(ipt_nt.value);

        if (nt >= 0 && nt <= 10) {
            alert(`Nota válida!`);
        } else {
            alert(`Onde já se viu nota menor que 0 e maior que 10?!`)
        }
    }
</script>
