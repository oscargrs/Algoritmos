<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Diário de Viagens: Do Primeiro ao Último Destino</h1>

    Insira o destino da viagem: <br>
    <input type="text" id="ipt_destino">

    <button onclick="adicionar()">Adicionar</button> <br>

    <button onclick="primeira()">Primeira Viagem</button>

    <button onclick="terceira()">Terceira Viagem</button>

    <button onclick="ultima()">Última Viagem</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let viagens = [];

    function adicionar() {
        let destino = ipt_destino.value;
        viagens.push(destino);
    }

    function primeira() {
        if (viagens.length >= 1) { 
            div_msg.innerHTML = viagens[0];     
        } else {
            div_msg.innerHTML = `Ainda não viajou`;
        }    
    }

    function terceira() {
        if (viagens.length >= 3) {
            div_msg.innerHTML = viagens[2];
        } else {
            div_msg.innerHTML = `Ainda não fez a terceira viagem`;
        }
    }

    function ultima() {
        if (viagens.length >= 1) {
            div_msg.innerHTML = viagens[viagens.length - 1];
        } else {
            div_msg.innerHTML = `Ainda não viajou`;
        }
    }
</script>

b) Ao clicar no botão, esse destino deve ser adicionado a uma lista (que não aparece para o usuário). 

Obs: Não existe problema em serem registrados valores repetidos.

c) Devem haver os botões: 

  "Primeira viagem" - Ao ser clicado, aparece abaixo o primeiro local cadastrado ou "Ainda não viajou" - caso nenhuma (zero viagens) viagem tenha sido registrada;

  "Terceira viagem" - Ao ser clicado, aparece abaixo o terceiro local cadastrado ou "Ainda fez a terceira viagem", caso não tenha feito, ao menos, três viagens;

  "Última viagem" - Ao ser clicado, aparece abaixo o último local cadastrado ou "Ainda não viajou", caso nenhuma (zero viagens) viagem tenha sido registrada.
-->
