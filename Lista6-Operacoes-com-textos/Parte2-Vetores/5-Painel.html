<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Painel de Favoritos: Seus Filmes em Destaque</h1>

    Insira o nome dos filmes que você mais gosta, um por vez e em ordem de primeiro, segundo, terceiro e assim por diante:<br>
    <input type="text" id="ipt_filme"><br>

    <button onclick="cadastrar()">Cadastrar Filme</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let favoritos = [];

    function cadastrar() {
        let filme = ipt_filme.value;
        favoritos.push(filme);
        
        div_msg.innerHTML = `Seu filme favorito: ${favoritos[0]}<br><br>`;
        
        if (favoritos.length >= 3) {
            div_msg.innerHTML += `Seu 3º filme favorito: ${favoritos[2]}<br><br>`;
        } else {
            div_msg.innerHTML += `Seu 3º filme favorito: Ainda não existe<br><br>`;
        }
        
        div_msg.innerHTML += `Total de filmes cadastrados: ${favoritos.length}`;
    }
</script>

<!--
5. Painel de Favoritos: Seus Filmes em Destaque
Crie um programa o qual: 
a) Usuário cadastre os nomes de seus filmes favoritos e adiciona cada um ao clicar em "Cadastrar Filme";

b) Na medida em que vai cadastrando, deve ser exibido ou atualizado um "painel" como neste exemplo: 

  Seu filme favorito: Donnie Darko

  Seu 3º filme favorito: A era do gelo 1 

  Total de filmes cadastrados: 5 

Obs: no "3º filme", caso não tenham sido cadastrados ainda 3 filmes, exibir "Ainda não existe". 

Obs: o "Filme favorito" é o primeiro cadastrado.
-->
