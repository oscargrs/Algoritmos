<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>
    <h1>Top Filmes Favoritos: Do Mais Amado ao Menos</h1>

    Insira o nome dos filmes que você mais gosta, um por vez e em ordem de primeiro, segundo, terceiro e assim por diante: <br>
    <input type="text" id="ipt_filme"> <br>

    <button onclick="cadastrar()">Cadastrar filme</button>

    <button onclick="verFavoritos()">Ver Favoritos</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let favoritos = [];

    function cadastrar() {
        let filme = ipt_filme.value;
        favoritos.push(filme);
        div_msg.innerHTML += `Cadastrado!<br>`;
    }

    function verFavoritos() {
        div_msg.innerHTML = favoritos.toString().replaceAll(',', '<br>');
        div_msg.innerHTML += `<br><br>Total: ${favoritos.length}`;
        div_msg.innerHTML += `<br><br>
        O filme que mais gosta é ${favoritos[0]}.
        <br><br>
        E desses, o que menos gosta é ${favoritos[favoritos.length - 1]}.`;
    }
</script>

Crie um programa o qual:

a) O usuário informa os nomes dos filmes que mais gosta, começando pelo seu favorito e depois o segundo que mais gosta e assim por diante. 

b) Para cadastrar cada filme, ele clica em "Cadastrar filme";

c) Crie um botão "Ver Favoritos" que, ao ser clicado, exibe os filmes favoritos;

d) Exiba também, abaixo de tudo, uma frase assim:  "Total: X";

d.1) Após a frase acima, mostre as seguintes frases: 

 O que filme que mais gosta é A.

 E desses, o que menos gosta é B 

  Obs: "A" é o primeiro filme cadastrado e "B" o último.
-->
