<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Lista Viva de Filmes Favoritos</h1>

    Insira o nome dos filmes que você mais gosta:<br>
    <input type="text" id="ipt_filme"><br>

    <button onclick="cadastrar()">Cadastrar</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let favoritos = [];

    function cadastrar() {
        let filme = ipt_filme.value;
        favoritos.push(filme);

        div_msg.innerHTML += `${favoritos[favoritos.length - 1]}<br>`;
    }
</script>
