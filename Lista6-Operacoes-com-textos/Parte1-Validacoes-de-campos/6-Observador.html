<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Observador de Índices</h1>

    Insira uma frase:
    <input type="text" id="ipt_frase"> <br>

    Insira o número de qual letra deseja ver:
    <input oninput="buscar()" type="text" id="ipt_numero">

    <div id="div_msg"></div>
</body>
</html>

<script>
    function buscar() {
        let frase = ipt_frase.value;
        let numero = ipt_numero.value;

        if (numero == 1) {
            div_msg.innerHTML = `A primeira letra é: ${frase[numero - 1]}`;
        } else if (numero == frase.length) {
            div_msg.innerHTML = `A última letra é: ${frase[numero - 1]}`;
        } else if (numero >= 1 && numero <= frase.length) {
            div_msg.innerHTML = `A ${numero}º letra é: ${frase[numero - 1]}`;
        }
    }
</script>
