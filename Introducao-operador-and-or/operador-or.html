<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador End</title>
</head>

<body>
    Número:

    <input type="number" id="ipt_num"> <br>

    <button onclick="analisar()">Analisar</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function analisar() {
        let num = Number(ipt_num.value);

        if (num < 0 || num > 10) {
            div_msg.innerHTML = `O número ${num} não entre 0 e 10`;
        } else {
            div_msg.innerHTML = `O número ${num} está entre 0 e 10`;
        }
    }
</script>
