<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução AND OR</title>
</head>

<body>
    Idade:
    <input type="number" id="ipt_idade"> <br>

    Pagamento:
    <select id="select_pagamento">
        <option>Dinheiro</option>
        <option>Cartão</option>
        <option>Cheque</option>
    </select>

    <button onclick="pagar()">Pagar</button>

    <div id="div_msg"></div>
</body>

</html>

<script>
    function pagar() {
        let idade = Number(ipt_idade.value);
        let pagamento = select_pagamento.value;

        if (idade >= 18 && (pagamento == 'Dinheiro' || pagamento == 'Cartão')) {
            div_msg.innerHTML = `Pode pagar`;
        } else {
            div_msg.innerHTML = `Não pode pagar`;
        }
    }
</script>
