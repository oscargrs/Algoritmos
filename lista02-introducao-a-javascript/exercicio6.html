<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6v2</title>
</head>
<body>
    <button id="button_pare" onclick="pare ()">Pare</button>
    <button id="button_pense" onclick="pense ()">Pense</button>
    <button id="button_siga" onclick="siga ()">Siga</button>
    <p id="mensagem"></p>
</body>
</html>

<script>
    function pare () {
        mensagem.textContent = "Pare e Aguarde!";
    }
    function pense () {
        mensagem.textContent = "Pense se pode seguir ou se deve parar!";
    }
    function siga () {
        mensagem.textContent = "Pode seguir adiante!";
    }
</script>
