<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Temperatura:
    <input type="number" id="input_temperatura" />
    <button onclick="analisar()">Analisar</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function analisar() {
        let temperatura = Number(input_temperatura.value);

        if (temperatura < 0) {
            div_mensagem.innerHTML = `Temperatura abaixo de 0`;
        } else {
            if (temperatura <= 10) {
               div_mensagem.innerHTML = `Temperatura entre 0 e 10`;             
            } else {
                div_mensagem.innerHTML = `Temperatura entre 0 e 10`;
            }
        }
    }
</script>
