<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>
    <h1>É tri/penta!</h1>

    Início do intervalo:
    <input type="number" id="ipt_inicio"> <br>

    Fim do intervalo:
    <input type="number" id="ipt_fim"> <br><br>

    <button onclick="ver()">Curto 3 e 5!</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function ver() {
        div_msg.innerHTML = "";

        let inicio = Number(ipt_inicio.value);
        let fim = Number(ipt_fim.value);

        if (inicio > fim) {
            div_msg.innerHTML = "Intervalo inválido";
            return;
        }

        let contador = inicio;

        while (contador <= fim) {

            if (contador % 3 == 0 && contador % 5 == 0) {
                div_msg.innerHTML += `É TRI!É PENTA!<br>`;
            } else if (contador % 3 == 0) {
                div_msg.innerHTML += `É TRI!<br>`;
            } else if (contador % 5 == 0) {
                div_msg.innerHTML += `É PENTA!<br>`;
            } else {
                div_msg.innerHTML += `${contador}<br>`;
            }

            contador++;
        }
    }
</script>

<!--
15. É tri/penta!
Crie um programa o qual:

a) Deve ter dois campos para o usuário informar o intervalo crescente de números

b) Deve ter um botão chamado "Curto 3 e 5!"

c) Ao clicar nesse botão, devem aparecer QUASE todos os números entre o intervalo informado, porém...

d) Se o número for múltiplo de 3, ao invés do número exiba "É TRI!". Se o número for múltiplo de 5, ao invés do número exiba "É PENTA!". Se o número for múltiplo de 3 e também de 5, ao invés do número exiba "É TRI!É PENTA!".
-->
