<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Filtro de Números Cabalísticos</h1>

    <button onclick="filtrar()">Filtrar números Cabalísticos</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function filtrar() {
        div_msg.innerHTML = "";

        let contador = 0;

        while (contador < 30) {
            contador++;

            if (contador != 3 && contador != 4 && contador != 7 && contador != 10 && contador != 12) {
                div_msg.innerHTML += `${contador}<br>`;
            }
        }
    }
</script>

<!--
6. Filtro de Números Cabalísticos
Crie um programa o qual:

a) Ao clicar num botão "Filtrar números Cabalísticos"...   

c) Exiba, debaixo do botão, os números de 1 a 30, um embaixo do outro, PORÉM, NÃO devem aparecer os números 3, 4, 7, 10 e 12.

OBS: não se atenha ao termo "cabalístico", o que importa é somente travar essa sequência de números
-->
