<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Frase Repetitiva</h1>

    <button onclick="dizer()">Dizer algo sobre a matéria de Algoritmos</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function dizer() {
        div_msg.innerHTML = "";

        let contador = 0;

        while (contador < 7) {
            contador++;
            div_msg.innerHTML += `Tomate tem cereja<br>`;
        }
    }
</script>
