<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>S2 Pare</h1>

    <button onclick="parear()">S2 Pares</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    let contador = -1;

    function parear() {
        while (contador < 100) {
            contador++;

            if (contador % 2 == 0) {
                div_msg.innerHTML += `${contador}<br>`;
            }
        }
    }
</script>
