<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h1>Múltiplos de 5</h1>

    Insira um número:
    <input type="number" id="ipt_num"> <br>

    <button onclick="multiplos()">Adoro múltiplos de 5</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function multiplos() {
        div_msg.innerHTML = "";

        let num = Number(ipt_num.value);

        if (num < 20 || num > 100) {
            div_msg.innerHTML = "Digite um número entre 20 e 100";
            return;
        }

        let contador = 0;

        while (contador <= num) {
            if (contador % 5 == 0) {
                div_msg.innerHTML += `${contador}<br>`;
            }
            contador++;
        }
    }
</script>

<!--
8. Múltiplos de 5
Crie um programa o qual:

a) Receba do usuário um número (tem que ser entre 20 e 100)  

b) Ao clicar num botão "Adoro múltiplos de 5"...   

c) Exiba, debaixo do botão, todos os múltiplos de 5 entre 0 e o número informado em a), um embaixo do outro. Ex: 5, 10, 15, 20... 
-->
