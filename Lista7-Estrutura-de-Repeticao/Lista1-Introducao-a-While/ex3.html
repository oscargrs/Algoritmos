<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Frase Numerada</h1>

    <button onclick="dizer()">Dizer algo sobre a matéria de Algoritmos</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function dizer() {
        div_msg.innerHTML = "";

        let contador = 0;

        while (contador < 7) {
            contador++;
            div_msg.innerHTML += `${contador}. Tomate tem cereja<br>`;
        }
    }
</script>

3. Frase Numerada
Refaça o programa anterior de tal forma que, antes de cada frase apareça um contador. Ex: Se a frase digitada foi “Boa Tarde” a página ficará assim:   

   1. Boa tarde   

   2. Boa tarde   

   ...   

   7. Boa tarde  
-->
