<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <h1>Viva o 7!</h1>

    Insira um número entre 0 e 100:
    <input type="number" id="ipt_num"> <br>

    <button onclick="viva()">Viva o 7!</button>

    <div id="div_msg"></div>
</body>
</html>

<script>
    function viva() {
        div_msg.innerHTML = "";

        let num = Number(ipt_num.value);

        if (num < 0 || num > 200) {
            div_msg.innerHTML = "Digite um número entre 0 e 200";
            return;
        }

        let contador = 0;

        while (contador <= num) {
            div_msg.innerHTML += `${contador}<br>`;
            contador += 7;
        }
    }
</script>

<!--
9. Viva o 7!
Crie um programa o qual:

a) Receba um número (tem que estar entre 0 e 200);  

b) Ter um botão chamado "Viva o 7!"   

c) Ao clicar nesse botão, devem aparecer todos os múltiplos de 7 entre 0 e o número informado em a)
-->
